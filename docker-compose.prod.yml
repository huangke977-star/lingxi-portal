services:
  caddy:
    image: caddy:2-alpine
    container_name: lingxi-caddy
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-5200918.xyz}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  mysql:
    image: mysql:8.4
    container_name: lingxi-mysql
    restart: unless-stopped
    command:
      [
        "mysqld",
        "--innodb-buffer-pool-size=128M",
        "--max-connections=40",
        "--performance-schema=OFF",
      ]
    mem_limit: 512m
    cpus: 0.75
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lingxi-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    mem_limit: 192m
    cpus: 0.25
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-bootstrap:
    image: ghcr.io/huangke977-star/lingxi-portal-api:main
    pull_policy: always
    container_name: lingxi-api-bootstrap
    restart: "no"
    mem_limit: 384m
    cpus: 0.5
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379
    command: ["sh", "-c", "cd apps/api && ./node_modules/.bin/prisma migrate deploy && node dist/prisma/seed.js"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    image: ghcr.io/huangke977-star/lingxi-portal-api:main
    pull_policy: always
    container_name: lingxi-api
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.75
    environment:
      API_PORT: ${API_PORT:-3001}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRES_IN_DAYS: ${REFRESH_TOKEN_EXPIRES_IN_DAYS:-30}
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3001"
    depends_on:
      api-bootstrap:
        condition: service_completed_successfully

  web:
    image: ghcr.io/huangke977-star/lingxi-portal-web:main
    pull_policy: always
    container_name: lingxi-web
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.75
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-auto}
      API_INTERNAL_URL: http://api:3001
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
  mysql_data:
  redis_data:
